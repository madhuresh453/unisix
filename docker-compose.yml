services:
  mongo:
    image: mongo:7
    container_name: uni6ctf-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  server:
    build:
      context: .
      dockerfile: docker/server.Dockerfile
    container_name: uni6ctf-server
    restart: unless-stopped
    env_file:
      - .env
    environment:
      MONGODB_URI: mongodb://mongo:27017/uni6ctf
      CLIENT_URL: http://localhost:3000
    ports:
      - "5000:5000"
    depends_on:
      - mongo

  client:
    build:
      context: .
      dockerfile: docker/client.Dockerfile
    container_name: uni6ctf-client
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:5000/api
      NEXT_PUBLIC_SOCKET_URL: http://localhost:5000
    ports:
      - "3000:3000"
    depends_on:
      - server

volumes:
  mongo-data:
